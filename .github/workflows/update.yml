name: Auto Update Stock Dashboard

on:
  schedule:
    - cron: '0 * * * *' # 每小時執行一次
  workflow_dispatch: # 允許手動點擊執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 🆙 升級到 v4，解決 Node.js 警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 🆙 升級到 v5，解決 Node.js 警告
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        run: |
          # 如果你的 Python 檔案不叫 main.py，請把下面這行的 main.py 改成你的真實檔名！
          python main.py 

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add . # 🤖 改用全面加入，防止找不到單一檔案報錯
          git commit -m "Auto-update dashboard via GitHub Actions" || echo "No changes to commit"
          git push
