name: 雲端自動量化選股更新

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 22 * * *'  
    - cron: '0 4 * * *'   
    - cron: '1 8 * * *'   
    - cron: '0 12 * * *'  
    - cron: '0 14 * * *'  

permissions:
  contents: write

jobs:
  run-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 取得最新程式碼
        uses: actions/checkout@v3

      - name: 2. 建立 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 3. 安裝量化套件與防封鎖工具
        # 新增了 curl_cffi 來突破 Yahoo 的封鎖限制
        run: |
          pip install yfinance pandas numpy plotly scikit-learn curl_cffi

      - name: 4. 建立輸出資料夾
        # 確保雲端主機有 output 資料夾，否則 Python 存檔會報錯
        run: mkdir -p output

      - name: 5. 執行您的選股系統
        run: python turnaround_monitor.py

      - name: 6. 將最新生成的 HTML 報告上傳覆蓋
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/turnaround_dashboard.html
          git commit -m "Auto-update: 最新量化選股數據" -a || exit 0
          git push
